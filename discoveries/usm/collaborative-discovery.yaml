name: Collaborative Discovery

activities:
  - key: story-mapping
    name: Story Mapping
    steps:
      - key: identify-activities
        name: Identify user activities
      - key: break-into-tasks
        name: Break activities into tasks
      - key: discover-stories
        name: Discover stories
        stories:
          - key: confirm-story-context
            name: Confirm story context
          - key: confirm-story-map
            name: Confirm story map
      - key: record-stories
        name: Record stories
        stories:
          - key: write-out-stories-from-usm
            name: Write out stories from USM
      - key: slice-releases
        name: Slice into releases
        stories:
          - key: split-release-scope
            name: Split release scope

  - key: discovery
    name: Discovery
    steps:
      - key: pick-story
        name: Pick a story to explore
      - key: discover-rules
        name: Discover rules
        stories:
          - key: confirm-discovery-outcomes
            name: Confirm discovery outcomes
      - key: illustrate-examples
        name: Illustrate with examples
      - key: capture-questions
        name: Capture questions

releases:
  - name: Walking Skeleton
    stories:
      - confirm-story-context
      - confirm-story-map
      - confirm-discovery-outcomes
  - stories:
      - write-out-stories-from-usm
      - split-release-scope
