rules:
  - id: R-01
    name: An example mapping can be rendered as a sticky view with only a story reference
    examples:
      - id: EX-01
        name: A YAML with only a story reference displays a single yellow Story card

  - id: R-02
    name: Cards are laid out following the Example Mapping format
    examples:
      - id: EX-01
        name: Rules are displayed as blue cards in a row below the Story card
      - id: EX-02
        name: Examples are displayed as green cards stacked under their Rule
      - id: EX-03
        name: Questions are displayed as red cards in a separate column

  - id: R-03
    name: Each card displays its name
    examples:
      - id: EX-01
        name: A Rule card shows the rule name text
      - id: EX-02
        name: The Story card shows the name from the story markdown file, not the key

  - id: R-04
    name: Multiple examples under a rule are stacked vertically
    examples:
      - id: EX-01
        name: A Rule with 3 examples shows 3 green cards stacked below the blue card
      - id: EX-02
        name: A Rule with no examples shows only the blue card with no green cards below

questions: []
