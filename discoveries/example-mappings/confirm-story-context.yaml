rules:
  - id: R-01
    name: Story list is generated from all md files under stories/
    examples:
      - id: EX-01
        name: stories/confirm-discovery-outcomes.md exists, index.html shows "Confirm discovery outcomes" as a list item
  - id: R-02
    name: View is a simple list
    examples: []
  - id: R-03
    name: Show empty state message when no stories exist
    examples:
      - id: EX-01
        name: stories/ has 0 files, index.html shows "No stories found."
  - id: R-04
    name: Story name links to detail page at story/{key}.html
    examples:
      - id: EX-01
        name: Clicking "Confirm discovery outcomes" navigates to story/confirm-discovery-outcomes.html
  - id: R-05
    name: Detail page shows story name and body
    examples:
      - id: EX-01
        name: story/confirm-discovery-outcomes.html shows title and "As a team member I want to confirm..."
  - id: R-06
    name: Detail page links to example mapping if it exists
    examples:
      - id: EX-01
        name: confirm-discovery-outcomes has an example mapping YAML, detail page shows link to mapping/confirm-discovery-outcomes.html
      - id: EX-02
        name: Story has no example mapping YAML, detail page shows no link

questions:
  - id: Q-01
    text: Should story-to-example-mapping association be based on filename or YAML story field?
