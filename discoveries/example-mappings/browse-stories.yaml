rules:
  - id: R-01
    name: Story list is generated from all md files under stories/
    examples:
      - id: EX-01
        name: stories/view-example-mapping.md exists, index.html shows "View Example Mapping as sticky notes" as a list item
  - id: R-02
    name: View is a simple list
    examples: []
  - id: R-03
    name: Show empty state message when no stories exist
    examples:
      - id: EX-01
        name: stories/ has 0 files, index.html shows "No stories found."
  - id: R-04
    name: Story name links to detail page at story/{key}.html
    examples:
      - id: EX-01
        name: Clicking "View Example Mapping as sticky notes" navigates to story/view-example-mapping.html
  - id: R-05
    name: Detail page shows story name and body
    examples:
      - id: EX-01
        name: story/view-example-mapping.html shows title and "As a team member I want to view..."
  - id: R-06
    name: Detail page links to example mapping if it exists
    examples:
      - id: EX-01
        name: view-example-mapping has an example mapping YAML, detail page shows link to mapping/view-example-mapping.html
      - id: EX-02
        name: Story has no example mapping YAML, detail page shows no link

questions:
  - id: Q-01
    text: Should story-to-example-mapping association be based on filename or YAML story field?
