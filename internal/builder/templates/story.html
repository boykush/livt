<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Story.Name}} - livt</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<header class="bg-white border-b border-gray-200">
  <div class="max-w-3xl mx-auto px-6 py-4 flex items-center gap-3">
    <a href="../index.html" class="text-sm text-gray-400 hover:text-gray-600">&larr; Stories</a>
    <span class="text-gray-300">|</span>
    <span class="text-xl font-bold text-gray-900 tracking-tight">livt</span>
  </div>
</header>

<main class="max-w-3xl mx-auto px-6 py-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-1">{{.Story.Name}}</h1>
  <p class="text-xs text-gray-400 mb-6">{{.Story.Key.Value}}</p>

  {{if .Story.Body}}
  <div class="bg-white rounded-lg border border-gray-200 px-6 py-5 mb-6">
    <pre class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">{{.Story.Body}}</pre>
  </div>
  {{end}}

  {{if .MappingPath}}
  <a href="{{.MappingPath}}" class="inline-flex items-center gap-1.5 bg-blue-50 text-blue-700 text-sm font-medium px-4 py-2 rounded-lg border border-blue-200 hover:bg-blue-100 transition">
    Example Mapping &rarr;
  </a>
  {{end}}
</main>
</body>
</html>
