<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>livt - Stories</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<header class="bg-white border-b border-gray-200">
  <div class="max-w-3xl mx-auto px-6 py-4">
    <h1 class="text-xl font-bold text-gray-900 tracking-tight">livt</h1>
  </div>
</header>

<main class="max-w-3xl mx-auto px-6 py-8">
  <h2 class="text-lg font-semibold text-gray-700 mb-4">Stories</h2>
  {{range .}}
  <a href="{{.Path}}" class="block bg-white rounded-lg border border-gray-200 px-5 py-4 mb-3 hover:border-blue-300 hover:shadow-sm transition">
    <span class="text-base font-medium text-gray-900">{{.StoryName}}</span>
    <span class="block text-xs text-gray-400 mt-1">{{.StoryKey}}</span>
  </a>
  {{else}}
  <p class="text-gray-400 text-sm">No stories found.</p>
  {{end}}
</main>
</body>
</html>
