<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.StoryMap.Name}} - livt</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<header class="bg-white border-b border-gray-200">
  <div class="max-w-full mx-auto px-6 py-4 flex items-center gap-3">
    <a href="../index.html" class="text-sm text-gray-400 hover:text-gray-600">&larr; Stories</a>
    <span class="text-gray-300">|</span>
    <span class="text-xl font-bold text-gray-900 tracking-tight">livt</span>
  </div>
</header>

<main class="max-w-full mx-auto px-6 py-8">
<div class="flex items-center gap-4 text-xs text-gray-500 mb-4">
  <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-purple-100 border-l-2 border-purple-400 rounded-sm"></span>Story Map</span>
  <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-indigo-100 border-l-2 border-indigo-400 rounded-sm"></span>Activity</span>
  <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-blue-100 border-l-2 border-blue-400 rounded-sm"></span>Step</span>
  <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-yellow-100 border-l-2 border-yellow-400 rounded-sm"></span>Story</span>
</div>
<div class="bg-purple-100 border-l-4 border-purple-400 p-4 rounded shadow text-center text-lg font-bold text-gray-800 mb-6">
  {{.StoryMap.Name}}
</div>

<div class="flex gap-6 items-start">
{{range .StoryMap.Activities}}
  <div class="flex flex-col gap-2 min-w-[200px]">
    <div class="bg-indigo-100 border-l-4 border-indigo-400 p-4 rounded shadow font-semibold text-gray-800">
      {{.Name}}
    </div>
    <div class="flex gap-2 items-start">
    {{range .Steps}}
      <div class="flex flex-col gap-2 min-w-[180px] max-w-[220px]">
        <div class="bg-blue-100 border-l-4 border-blue-400 p-3 rounded shadow text-sm font-semibold text-gray-800">
          {{.Name}}
        </div>
        {{range .Stories}}
        <a href="../story/{{.Key}}.html" class="block bg-yellow-100 border-l-4 border-yellow-400 p-3 rounded shadow text-sm text-gray-700 hover:bg-yellow-200 transition">
          {{.Name}}
        </a>
        {{end}}
      </div>
    {{end}}
    </div>
  </div>
{{end}}
</div>
</main>
</body>
</html>
