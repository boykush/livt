<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.StoryName}} - livt</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<header class="bg-white border-b border-gray-200">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-3">
    <a href="../index.html" class="text-sm text-gray-400 hover:text-gray-600">&larr; Stories</a>
    <span class="text-gray-300">|</span>
    <span class="text-xl font-bold text-gray-900 tracking-tight">livt</span>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-8">
<div class="flex items-center gap-4 text-xs text-gray-500 mb-4">
  <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-yellow-100 border-l-2 border-yellow-400 rounded-sm"></span>Story</span>
  <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-blue-100 border-l-2 border-blue-400 rounded-sm"></span>Rule</span>
  <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-green-100 border-l-2 border-green-400 rounded-sm"></span>Example</span>
  <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-red-100 border-l-2 border-red-400 rounded-sm"></span>Question</span>
</div>
<div class="bg-yellow-100 border-l-4 border-yellow-400 p-4 rounded shadow text-center text-lg font-bold text-gray-800 mb-6">
  {{.StoryName}}
</div>

<div class="flex gap-6 items-start flex-wrap">
{{range .Mapping.Rules}}
  <div class="flex flex-col gap-2 min-w-[200px] max-w-[260px]">
    <div class="bg-blue-100 border-l-4 border-blue-400 p-4 rounded shadow font-semibold text-gray-800">
      {{.Name}}
    </div>
    {{range .Examples}}
    <div class="bg-green-100 border-l-4 border-green-400 p-4 rounded shadow text-gray-700 text-sm">
      {{.Name}}
    </div>
    {{end}}
  </div>
{{end}}
{{if .Mapping.Questions}}
  <div class="flex flex-col gap-2 min-w-[200px] max-w-[260px]">
    <div class="bg-red-50 border-l-4 border-red-300 p-3 rounded text-xs font-semibold text-red-400 uppercase tracking-wide">
      Questions
    </div>
    {{range .Mapping.Questions}}
    <div class="bg-red-100 border-l-4 border-red-400 p-4 rounded shadow text-gray-700 text-sm">
      {{.Text}}
    </div>
    {{end}}
  </div>
{{end}}
</div>
</main>
</body>
</html>
